[tasks.build-server]
command = "cargo"
args = ["build", "--release", "--target", "x86_64-unknown-linux-musl", "--features", "server", "--no-default-features", "--bin", "syncplaympv-server"]
[tasks.docker-build]
script = "docker --context default build --platform linux/amd64 -f Dockerfile -t syncplaympvserver:latest ."
[tasks.docker-save]
script = "mkdir -p ./target/docker && cd ./target/docker && docker save syncplaympvserver:latest | gzip > syncplaympvserver.tar.gz"
[tasks.docker-all]
dependencies = ["build-server", "docker-build", "docker-save"]
[tasks.build-windows]
command = "cargo"
args = ["xwin","build","--target x86_64-pc-windows-msvc","--release"]

[tasks.build-windows-release]
command = "cargo"
args = ["xwin", "build", "--target", "x86_64-pc-windows-msvc", "--release"]

[tasks.package-windows]
description = "Build and package a ready-to-use ZIP for Windows"
dependencies = ["build-windows-release"]
condition = { platforms = ["linux", "mac"] }
script_runner = "@shell"
script = """
# Set output paths (use absolute paths!)
PROJECT_DIR="$(pwd)"
DIST_DIR="${PROJECT_DIR}/target/dist"
ZIP_NAME="syncplaympv-windows.zip"
ZIP_PATH="${DIST_DIR}/${ZIP_NAME}"
TARGET_BIN="${PROJECT_DIR}/target/x86_64-pc-windows-msvc/release"

# Create dist directory
mkdir -p "${DIST_DIR}"

# Create temp staging folder
STAGING=$(mktemp -d)
mkdir -p "${STAGING}/syncplaympv"

# Copy binaries
cp "${TARGET_BIN}/syncplaympv-client.exe" "${STAGING}/syncplaympv/"
cp "${TARGET_BIN}/syncplaympv-server.exe" "${STAGING}/syncplaympv/"

# Copy MPV dependencies
cp "${PROJECT_DIR}/mpvbins/mpv.exe" "${STAGING}/syncplaympv/"
cp "${PROJECT_DIR}/mpvbins/mpv.com" "${STAGING}/syncplaympv/"
cp "${PROJECT_DIR}/mpvbins/vulkan-1.dll" "${STAGING}/syncplaympv/"
cp "${PROJECT_DIR}/mpvbins/mpv-register.bat" "${STAGING}/syncplaympv/"
cp "${PROJECT_DIR}/mpvbins/mpv-unregister.bat" "${STAGING}/syncplaympv/"

# Create ZIP
cd "${STAGING}"
zip -r "${ZIP_PATH}" syncplaympv

# Cleanup
rm -rf "${STAGING}"

echo "Package created: ${ZIP_PATH}"
"""

[tasks._package-windows-cmd]
description = "Internal: Windows packaging (runs only on Windows)"
dependencies = ["build-windows-release"]
condition = { platforms = ["windows"] }
script_runner = "cmd"
script = [
    "set DIST_DIR=target\\dist",
    "set ZIP_NAME=syncplaympv-windows.zip",
    "set ZIP_PATH=%DIST_DIR%\\%ZIP_NAME%",
    "set TARGET_BIN=target\\x86_64-pc-windows-msvc\\release",
    "",
    "if not exist %DIST_DIR% mkdir %DIST_DIR%",
    "",
    "set STAGING=%TEMP%\\syncplaympv-staging",
    "if exist %STAGING% rmdir /s /q %STAGING%",
    "mkdir %STAGING%\\syncplaympv",
    "",
    "copy %TARGET_BIN%\\syncplaympv-client.exe %STAGING%\\syncplaympv\\",
    "copy %TARGET_BIN%\\syncplaympv-server.exe %STAGING%\\syncplaympv\\",
    "copy mpvbins\\mpv.exe %STAGING%\\syncplaympv\\",
    "copy mpvbins\\mpv.com %STAGING%\\syncplaympv\\",
    "copy mpvbins\\vulkan-1.dll %STAGING%\\syncplaympv\\",
    "copy mpvbins\\mpv-register.bat %STAGING%\\syncplaympv\\",
    "copy mpvbins\\mpv-unregister.bat %STAGING%\\syncplaympv\\",
    "",
    "cd %STAGING%",
    "powershell -NoProfile -Command \"Compress-Archive -Path syncplaympv -DestinationPath '%ZIP_PATH%' -Force\"",
    "",
    "rmdir /s /q %STAGING%",
    "",
    "echo Package created: %ZIP_PATH%",
]

[tasks.docker-push]
dependencies = ["docker-all"]
script = "docker --context server stack remove syncplaympv && docker --context server load -i ./target/docker/syncplaympvserver.tar.gz && sleep 5 && docker --context server stack deploy -c Docker-prod.yml syncplaympv --detach=false"

